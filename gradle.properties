android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# jdk.net.unixdomain.tmpdir: 사용자 폴더 경로 공백("HP 15") 때문에 AF_UNIX 소켓 생성이 실패하는 문제 우회
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8 -Djdk.net.unixdomain.tmpdir=C:/tmp
kotlin.daemon.jvmargs=-Xmx1536m -Djdk.net.unixdomain.tmpdir=C:/tmp
